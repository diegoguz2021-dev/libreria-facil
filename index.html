<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba de mi librería</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    padding:40px;
    color:white;

    background: linear-gradient(135deg,#6ec3f4,#7c5ac8);
}

/* TITULOS */

h2{
    margin-top:30px;
}

/* BOTONES */

.botones{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.azul{
    background:#3498db;
    color:white;
}

.verde{
    background:#2ecc71;
    color:white;
}

.rojo{
    background:#e74c3c;
    color:white;
}

.amarillo{
    background:#f1c40f;
}

/* BOTON ACCION */

.accion{
    background:#27ae60;
    color:white;
}

/* TARJETAS */

.tarjetas{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.card{
    background:#ececec;
    color:#333;
    padding:20px;
    border-radius:10px;
    width:220px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    border-radius:8px;
}

/* LOADING */

.loading{
    display:flex;
    gap:15px;
    margin-top:15px;
}

.spinner{
    width:30px;
    height:30px;
    border:4px solid rgba(255,255,255,0.3);
    border-top:4px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<h1>Prueba de mi librería</h1>

<h2>Botones:</h2>

<div class="botones">

<button class="azul">Botón Azul</button>
<button class="verde">Botón Verde</button>
<button class="rojo">Botón Rojo</button>
<button class="amarillo">Botón Amarillo</button>

</div>

<h2>Botón con acción:</h2>

<button class="accion" onclick="cargar()">Cargar</button>

<h2>Tarjetas:</h2>

<div class="tarjetas">

<div class="card">
<img src="https://picsum.photos/300/150">
<h3>Mi primera tarjeta</h3>
<p>Esta tarjeta es muy bonita</p>
</div>

<div class="card">
<img src="https://picsum.photos/301/150">
<h3>Otra tarjeta</h3>
<p>Con diferentes colores</p>
</div>

</div>

<h2>Cargando:</h2>

<div class="loading">
<div class="spinner"></div>
<div class="spinner"></div>
</div>

<script>

function cargar(){
    alert("Cargando contenido...");
}

</script>

</body>
</html>
